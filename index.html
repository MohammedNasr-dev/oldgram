<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <header>
                <img class="logo" src="images/logo.png" alt="logo">
                <img class="avatar" src="images/user-avatar.png" alt="user-image">
        </header>
        <main>
            <div class="post">
                <div class="post-header">
                    <img class="avatar" src="images/avatar-vangogh.jpg" alt="vangogh-avatar">
                    <div class="name">
                        <p>Vincent Van Gogh<br><span>Zundert, Netherlands</span></p>
                    </div>
                </div>
                <div class="post-img">
                    <img class="post-img" src="images/post-vangogh.jpg" alt="vangogh post image">
                </div>
                <div class="icons-container">
                    <div class="icons">
                        <img src="images/icon-heart.png" alt="heart-icon">
                        <img src="images/icon-comment.png" alt="comment-icon">
                        <img src="images/icon-dm.png" alt="dm-icon">
                    </div>
                    <p>21492 likes</p>
                </div>
            </div>
        </main>
        <footer>
            <p>Vincey1853<span> just took a few mushrooms lol</span></p>
        </footer>
        <script src="index.js"></script>
    </body>
</html>
